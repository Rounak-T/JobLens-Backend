services:
  - type: web
    name: joblens-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_lg && python train_model.py"
    startCommand: startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: JSEARCH_API_KEY
        sync: false